name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. Bandit — Python SAST ────────────────────────────────────────────────
  bandit:
    name: Bandit — Python SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install "bandit[toml]>=1.8"

      - name: Run Bandit (HIGH + CRITICAL only)
        run: |
          bandit -r adapters/ api/ cli/ cron/ graph/ indexer/ \
                    memory/ orchestrator/ retrieval/ rpc/ security/ server/ \
                    tools/ vector_db/ \
                 -x tests/ \
                 -ll

  # ── 2. pip-audit — dependency vulnerabilities ─────────────────────────────
  pip-audit:
    name: pip-audit — dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip install . --quiet
          pip-audit --severity high --no-deps

  # ── 3. Trivy — filesystem scan ────────────────────────────────────────────
  trivy:
    name: Trivy — filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  # ── 4. TruffleHog — secrets in git history ───────────────────────────────
  secrets:
    name: TruffleHog — secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified
