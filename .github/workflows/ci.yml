name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 = min supported, 3.12 = common prod target.
        # 3.13 excluded: heavy deps (faiss-cpu, sentence-transformers) often lag
        # a release cycle behind on pre-built wheels, causing 15-min source builds.
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system deps
        run: sudo apt-get install -y libgomp1

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          # Whole huggingface dir: hub/ blobs + symlink trees stay consistent.
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-${{ runner.os }}-${{ matrix.python-version }}

      - name: Install package + dev extras
        run: pip install -e ".[dev,languages,security]"
        timeout-minutes: 15

      - name: Pre-warm embedding model
        # Download all-MiniLM-L6-v2 once; later steps and tests use the cache.
        # Isolated from bootstrap so a slow download doesn't corrupt the index.
        timeout-minutes: 5
        run: |
          python - <<'PYEOF'
          from sentence_transformers import SentenceTransformer
          m = SentenceTransformer("all-MiniLM-L6-v2")
          _ = m.encode("warmup")
          print("Embedding model ready.")
          PYEOF

      - name: Bootstrap .cognirepo index (AST + graph only)
        # --no-embed: skip FAISS embedding entirely.
        # Without this flag, index-repo encodes 1000+ functions via the ML model —
        # that takes 5-10 min but the step has a 3-min timeout, killing it mid-write
        # and leaving a corrupt FAISS binary that causes tests to hang on load.
        # Tests that need FAISS recall data will pytest.skip() automatically.
        timeout-minutes: 2
        run: |
          mkdir -p .cognirepo
          python - <<'PYEOF'
          import json
          cfg = {
              "project_name": "cognirepo",
              "version": "0.2.1",
              "retrieval_weights": {"vector": 0.5, "graph": 0.3, "behaviour": 0.2},
              "storage": {"encrypt": False},
              "watch": {"auto_enabled": False},
              "autosave_context": True
          }
          with open(".cognirepo/config.json", "w") as f:
              json.dump(cfg, f)
          PYEOF
          cognirepo index-repo . --no-watch --no-embed
        env:
          HF_HUB_OFFLINE: "1"

      - name: Run tests
        timeout-minutes: 10
        run: |
          python -m pytest tests/ \
            -q \
            --tb=short \
            --timeout=30 \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -x
        env:
          COGNIREPO_DIR: .cognirepo
          HF_HUB_OFFLINE: "1"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
