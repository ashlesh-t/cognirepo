name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache sentence-transformers model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/torch/sentence_transformers
            ~/.cache/huggingface
          key: ${{ runner.os }}-st-all-MiniLM-L6-v2

      - name: Install dependencies
        run: |
          pip install -e ".[dev,security]"
          pip install grpcio grpcio-tools pylint pytest-mock

      - name: Lint (pylint)
        run: |
          pylint $(git ls-files '*.py' | grep -v 'venv/' | grep -v '_pb2') \
            --disable=C,R,import-error \
            --fail-under=8.0

      - name: Smoke-test index-repo (no-watch for CI)
        run: |
          cognirepo init --password changeme --no-index
          cognirepo index-repo . --no-watch
        env:
          COGNIREPO_MULTI_AGENT_ENABLED: "false"

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -x \
            --ignore=tests/test_api.py
        env:
          COGNIREPO_MULTI_AGENT_ENABLED: "false"

      - name: Check proto freshness
        run: |
          mkdir -p /tmp/proto_check
          python -m grpc_tools.protoc \
            -I rpc/proto \
            --python_out=/tmp/proto_check \
            --grpc_python_out=/tmp/proto_check \
            rpc/proto/cognirepo.proto
          if ! diff -q rpc/proto/cognirepo_pb2.py /tmp/proto_check/cognirepo_pb2.py > /dev/null 2>&1; then
            echo "ERROR: cognirepo_pb2.py is stale. Run 'make proto' to regenerate."
            exit 1
          fi
          if ! diff -q rpc/proto/cognirepo_pb2_grpc.py /tmp/proto_check/cognirepo_pb2_grpc.py > /dev/null 2>&1; then
            echo "ERROR: cognirepo_pb2_grpc.py is stale. Run 'make proto' to regenerate."
            exit 1
          fi
          echo "Proto files are up to date."

      - name: Run API tests (separate — needs fastapi[testclient])
        run: |
          pip install "httpx>=0.28" pytest-asyncio
          pytest tests/test_api.py -v --tb=short || true
        env:
          COGNIREPO_MULTI_AGENT_ENABLED: "false"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for TruffleHog

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Bandit — static security analysis
        run: |
          bandit -r . \
            --exclude ./.venv,./venv,./.cognirepo,./tests \
            --severity-level high \
            --confidence-level medium \
            -f txt
        # Fails CI on any HIGH severity finding

      - name: TruffleHog — secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: false
        # Fails CI if any verified secret is found in git history

      - name: Trivy — filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: table
        # Fails CI on CRITICAL/HIGH unpatched CVEs

      - name: Snyk — dependency vulnerability scan
        uses: snyk/actions/python@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical
        # Fails CI on CRITICAL dep vulnerabilities; requires SNYK_TOKEN secret
