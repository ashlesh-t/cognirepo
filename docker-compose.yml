version: "3.9"

services:

  # ── MCP stdio server (for Claude Desktop / Cursor) ─────────────────────────
  mcp:
    build:
      context: .
      target: runtime
    container_name: cognirepo-mcp
    volumes:
      - cognirepo_data:/app/.cognirepo
      - cognirepo_vectors:/app/vector_db
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      COGNIREPO_CB_RSS_LIMIT_MB: ${COGNIREPO_CB_RSS_LIMIT_MB:-}
    command: >
      sh -c "cognirepo init --non-interactive &&
             cognirepo serve"
    stdin_open: true
    tty: false
    restart: unless-stopped

  # ── Memory pruner cron ────────────────────────────────────────────────────
  pruner:
    build:
      context: .
      target: runtime
    container_name: cognirepo-pruner
    volumes:
      - cognirepo_data:/app/.cognirepo
      - cognirepo_vectors:/app/vector_db
    environment:
      COGNIREPO_CB_RSS_LIMIT_MB: ${COGNIREPO_CB_RSS_LIMIT_MB:-}
    # Run every day at 3 AM using supercronic-style loop
    command: >
      sh -c "while true; do
               echo '[pruner] running at $(date)';
               python -m cron.prune_memory --archive;
               sleep 86400;
             done"
    profiles:
      - pruner  # start only when: docker compose --profile pruner up
    restart: unless-stopped

volumes:
  cognirepo_data:
    driver: local
  cognirepo_vectors:
    driver: local
